# ClaudeBox build: fork UTM, build Alpine rootfs, build unsigned IPA for TrollStore.
# 适配标准 GitHub Actions runner (非 MacStadium self-hosted)。
name: ClaudeBox Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  # ── Job 1: 在 Linux 上构建 Alpine rootfs + kernel + initramfs ──
  build-rootfs:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-utils qemu-user-static e2fsprogs squashfs-tools

      - name: Register binfmt for aarch64
        run: |
          # Register qemu-user-static via binfmt_misc so chroot works
          docker run --rm --privileged multiarch/qemu-user-static --reset -p yes

      - name: Build Alpine rootfs with Claude Code
        run: |
          set -euo pipefail
          ALPINE_VER="3.21.7"
          CC_VER="2.1.196"
          WORK="$PWD/rootfs-work"
          ROOTFS="$WORK/rootfs"
          mkdir -p "$WORK"

          # 1. 下载 Alpine aarch64 minirootfs
          echo "=== 下载 Alpine ${ALPINE_VER} aarch64 minirootfs ==="
          curl -fL -o "$WORK/minirootfs.tar.gz" \
            "https://dl-cdn.alpinelinux.org/alpine/v3.21/releases/aarch64/alpine-minirootfs-${ALPINE_VER}-aarch64.tar.gz"

          # 2. 解压 rootfs
          echo "=== 解压 minirootfs ==="
          rm -rf "$ROOTFS"; mkdir -p "$ROOTFS"
          tar -xzf "$WORK/minirootfs.tar.gz" -C "$ROOTFS"

          # 3. 配置 apk 仓库
          cat > "$ROOTFS/etc/apk/repositories" <<'EOF'
          https://dl-cdn.alpinelinux.org/alpine/v3.21/main
          https://dl-cdn.alpinelinux.org/alpine/v3.21/community
          EOF

          # 4. 用 chroot + binfmt 安装依赖和内核
          echo "=== chroot 安装依赖 ==="
          # 挂载 proc/dev/sys 以便 chroot 内的 apk 正常工作
          sudo mount -t proc proc "$ROOTFS/proc"
          sudo mount --bind /dev "$ROOTFS/dev"
          sudo mount -t sysfs sysfs "$ROOTFS/sys"
          # 复制 resolv.conf 以便 DNS 解析
          sudo cp /etc/resolv.conf "$ROOTFS/etc/resolv.conf"
          # chroot 执行 apk install
          sudo chroot "$ROOTFS" /sbin/apk add --no-cache \
            libgcc libstdc++ ripgrep bash openssh linux-virt
          # 配置 mkinitfs 包含 ext4 和 virtio 驱动模块
          echo 'features="ata base ide scsi usb virtio ext4 ext2"' \
            | sudo tee "$ROOTFS/etc/mkinitfs/mkinitfs.conf"
          # 生成 initramfs（带 ext4 + virtio 支持）
          sudo chroot "$ROOTFS" /sbin/mkinitfs \
            -c /etc/mkinitfs/mkinitfs.conf \
            "$(cat "$ROOTFS/usr/share/kernel/virt/kernel.release")"

          # 5. 获取 Claude Code ARM64 musl 二进制
          echo "=== 获取 Claude Code v${CC_VER} ==="
          CC_BIN="$ROOTFS/usr/local/bin/claude"
          URL=$(curl -fsSL "https://registry.npmjs.org/@anthropic-ai/claude-code-linux-arm64-musl" \
            | python3 -c "import sys,json;d=json.load(sys.stdin);print(d['versions']['${CC_VER}']['dist']['tarball'])")
          curl -fL -o "$WORK/cc.tgz" "$URL"
          mkdir -p "$WORK/cc-x"; tar -xzf "$WORK/cc.tgz" -C "$WORK/cc-x"
          sudo install -m755 "$WORK/cc-x/package/claude" "$CC_BIN"

          # 6. 验证 claude 二进制可执行
          echo "=== 验证 claude ==="
          sudo chroot "$ROOTFS" /usr/local/bin/claude --version || true

          # 7. 配置串口终端自动登录 (console=ttyAMA0)
          echo "=== 配置串口终端 ==="
          # 设置 root 无密码登录
          sudo sed -i 's|^root:.*|root::19000:0:99999:7:::|' "$ROOTFS/etc/shadow"
          # 配置 inittab 串口终端
          sudo tee "$ROOTFS/etc/inittab" <<'INITTAB'
          ::sysinit:/sbin/openrc sysinit
          ::sysinit:/sbin/openrc boot
          ::wait:/sbin/openrc default
          ttyAMA0::respawn:/sbin/getty -L 0 ttyAMA0 vt100
          ::ctrlaltdel:/sbin/reboot
          ::shutdown:/sbin/openrc shutdown
          INITTAB
          # 配置网络
          sudo tee "$ROOTFS/etc/network/interfaces" <<'NETIF'
          auto lo
          iface lo inet loopback
          auto eth0
          iface eth0 inet dhcp
          NETIF
          # 配置 hostname
          echo "claudebox" | sudo tee "$ROOTFS/etc/hostname"

          # 8. 清理 chroot 挂载
          sudo umount "$ROOTFS/proc" "$ROOTFS/dev" "$ROOTFS/sys" 2>/dev/null || true

          # 9. 创建 ext4 磁盘镜像
          echo "=== 创建 ext4 磁盘镜像 ==="
          dd if=/dev/zero of="$WORK/alpine-rootfs.img" bs=1M count=1024
          mkfs.ext4 -F "$WORK/alpine-rootfs.img"
          mkdir -p "$WORK/mnt"
          sudo mount -o loop "$WORK/alpine-rootfs.img" "$WORK/mnt"
          sudo cp -a "$ROOTFS/." "$WORK/mnt/"
          sudo umount "$WORK/mnt"

          # 10. 提取 kernel 和 initramfs
          echo "=== 提取 kernel 和 initramfs ==="
          sudo cp "$ROOTFS/boot/vmlinuz-virt" "$WORK/alpine-vmlinuz"
          sudo chmod 644 "$WORK/alpine-vmlinuz"
          # mkinitfs 生成的 initramfs 在 /boot 下
          KVER=$(sudo cat "$ROOTFS/usr/share/kernel/virt/kernel.release")
          if sudo test -f "$ROOTFS/boot/initramfs-virt"; then
            sudo cp "$ROOTFS/boot/initramfs-virt" "$WORK/alpine-initramfs"
          elif sudo test -f "$ROOTFS/boot/initramfs-$KVER"; then
            sudo cp "$ROOTFS/boot/initramfs-$KVER" "$WORK/alpine-initramfs"
          else
            echo "ERROR: initramfs not found. Listing /boot:"
            sudo ls -la "$ROOTFS/boot/"
            exit 1
          fi
          sudo chmod 644 "$WORK/alpine-initramfs"

          # 11. 转换磁盘为 qcow2
          echo "=== 转换为 qcow2 ==="
          qemu-img convert -f raw -O qcow2 "$WORK/alpine-rootfs.img" "$PWD/alpine-rootfs.qcow2"

          # 移动文件到输出目录
          cp "$WORK/alpine-vmlinuz" "$PWD/alpine-vmlinuz"
          cp "$WORK/alpine-initramfs" "$PWD/alpine-initramfs"

          echo "=== 输出文件 ==="
          ls -lh "$PWD/alpine-rootfs.qcow2" "$PWD/alpine-vmlinuz" "$PWD/alpine-initramfs"

      - name: Upload rootfs artifacts
        uses: actions/upload-artifact@v4
        with:
          name: alpine-rootfs
          path: |
            alpine-rootfs.qcow2
            alpine-vmlinuz
            alpine-initramfs
          retention-days: 3

  # ── Job 2: 在 macOS 上构建 IPA ──
  build:
    needs: build-rootfs
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_26.0.app
          xcodebuild -version

      - name: Download Sysroot (ios-arm64)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 用 gh CLI 从上游 UTM 的 release build 下载 Sysroot-ios-arm64
          RUN_ID=$(gh run list --repo utmapp/UTM --workflow Build --event release --limit 1 --json databaseId --jq '.[0].databaseId')
          echo "Using upstream run: $RUN_ID"
          mkdir -p sysroot-tmp
          gh run download "$RUN_ID" --repo utmapp/UTM --name Sysroot-ios-arm64 --dir sysroot-tmp
          ls -la sysroot-tmp/
          tar -xzf sysroot-tmp/sysroot.tgz
          echo "--- sysroot 目录 ---"
          ls -d sysroot-*/
          ls sysroot-ios-arm64/ | head -10

      - name: Download Alpine rootfs
        uses: actions/download-artifact@v4
        with:
          name: alpine-rootfs
          path: alpine-assets

      - name: Resolve SPM packages
        run: |
          xcodebuild -resolvePackageDependencies -project UTM.xcodeproj -scheme iOS || true

      - name: Build unsigned archive
        run: |
          ./scripts/build_utm.sh -k iphoneos -s iOS -a arm64 -o build/ClaudeBox
          ls -la build/ClaudeBox.xcarchive/Products/Applications/

      - name: Inject Alpine assets into App bundle
        run: |
          APP_PATH=$(find build/ClaudeBox.xcarchive -name "UTM.app" -type d | head -1)
          echo "App bundle: $APP_PATH"
          mkdir -p "$APP_PATH/AlpineAssets"
          cp alpine-assets/alpine-rootfs.qcow2 "$APP_PATH/AlpineAssets/"
          cp alpine-assets/alpine-vmlinuz "$APP_PATH/AlpineAssets/"
          cp alpine-assets/alpine-initramfs "$APP_PATH/AlpineAssets/"
          echo "--- AlpineAssets 内容 ---"
          ls -lh "$APP_PATH/AlpineAssets/"

      - name: Package unsigned IPA
        run: |
          APP_PATH=$(find build/ClaudeBox.xcarchive -name "UTM.app" -type d | head -1)
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          # 改名为 ClaudeBox
          if [ -d "Payload/UTM.app" ]; then
            mv "Payload/UTM.app" "Payload/ClaudeBox.app"
          fi
          zip -r ClaudeBox-unsigned.ipa Payload
          ls -lh ClaudeBox-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClaudeBox-unsigned-ipa
          path: ClaudeBox-unsigned.ipa
          retention-days: 7

      - name: Release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ClaudeBox-unsigned.ipa
