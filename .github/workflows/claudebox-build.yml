# ClaudeBox build: fork UTM with xterm.js terminal, build unsigned IPA for TrollStore.
name: ClaudeBox Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_26.0.app
          xcodebuild -version

      - name: Download Sysroot (ios-arm64)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID=$(gh run list --repo utmapp/UTM --workflow Build --event release --limit 1 --json databaseId --jq '.[0].databaseId')
          echo "Using upstream run: $RUN_ID"
          mkdir -p sysroot-tmp
          gh run download "$RUN_ID" --repo utmapp/UTM --name Sysroot-ios-arm64 --dir sysroot-tmp
          ls -la sysroot-tmp/
          tar -xzf sysroot-tmp/sysroot.tgz
          echo "--- sysroot 目录 ---"
          ls -d sysroot-*/
          ls sysroot-ios-arm64/ | head -10

      - name: Resolve SPM packages
        run: |
          xcodebuild -resolvePackageDependencies -project UTM.xcodeproj -scheme iOS || true

      - name: Build unsigned archive
        run: |
          ./scripts/build_utm.sh -k iphoneos -s iOS -a arm64 -o build/ClaudeBox
          ls -la build/ClaudeBox.xcarchive/Products/Applications/

      - name: Inject WebTerminal assets into App bundle
        run: |
          APP_PATH=$(find build/ClaudeBox.xcarchive -name "UTM.app" -type d | head -1)
          echo "App bundle: $APP_PATH"
          mkdir -p "$APP_PATH"
          cp Platform/iOS/Display/WebTerminal/terminal.html "$APP_PATH/"
          cp Platform/iOS/Display/WebTerminal/xterm.js "$APP_PATH/"
          cp Platform/iOS/Display/WebTerminal/xterm.css "$APP_PATH/"
          cp Platform/iOS/Display/WebTerminal/addon-fit.js "$APP_PATH/"
          echo "--- WebTerminal assets in bundle ---"
          ls -lh "$APP_PATH/terminal.html" "$APP_PATH/xterm.js" "$APP_PATH/xterm.css" "$APP_PATH/addon-fit.js"

      - name: Package unsigned IPA
        run: |
          APP_PATH=$(find build/ClaudeBox.xcarchive -name "UTM.app" -type d | head -1)
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          if [ -d "Payload/UTM.app" ]; then
            mv "Payload/UTM.app" "Payload/ClaudeBox.app"
          fi
          zip -r ClaudeBox-unsigned.ipa Payload
          ls -lh ClaudeBox-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClaudeBox-unsigned-ipa
          path: ClaudeBox-unsigned.ipa
          retention-days: 7

      - name: Release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ClaudeBox-unsigned.ipa
